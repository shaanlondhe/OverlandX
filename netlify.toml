[build]
  publish = "."

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' api.mapbox.com events.mapbox.com *.tiles.mapbox.com data: blob: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob: *.mapbox.com; connect-src 'self' api.mapbox.com events.mapbox.com *.tiles.mapbox.com;"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[build.processing]
  skip_processing = true

[build.processing.js]
  bundle = false
  minify = false

[build.processing.css]
  bundle = false
  minify = false

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

[[headers]]
  for = "/trails/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000"

[build.environment]
  NODE_VERSION = "18" 