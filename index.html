<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="preconnect" href="https://api.mapbox.com">
    <link rel="preconnect" href="https://events.mapbox.com">
    <link rel="preconnect" href="https://tiles.mapbox.com">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline';">
    <title>OverlandX - Adventure Awaits</title>
    <base href="/">
    <link rel="stylesheet" href="style.css">
    <link rel="preload" href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' as="style" onload="this.onload=null;this.rel='stylesheet'" crossorigin="anonymous">
    <noscript><link rel="stylesheet" href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css'></noscript>
    <script>
        // Handle loading errors
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK') {
                const element = document.createElement('div');
                element.className = 'loading-error';
                element.innerHTML = 'Having trouble loading resources. <button onclick="window.location.reload()">Retry</button>';
                document.body.prepend(element);
            }
        }, true);

        // Add loading indicator
        document.addEventListener('DOMContentLoaded', function() {
            const loader = document.createElement('div');
            loader.id = 'page-loader';
            loader.innerHTML = 'Loading...';
            document.body.prepend(loader);
            
            // Remove loader when everything is loaded
            window.addEventListener('load', function() {
                loader.style.display = 'none';
            });

            // Remove loader after 5 seconds anyway
            setTimeout(() => {
                loader.style.display = 'none';
            }, 5000);
        });
    </script>
    <style>
        #page-loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #2196F3;
            color: white;
            text-align: center;
            padding: 10px;
            z-index: 9999;
        }
        .loading-error {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #ff5252;
            color: white;
            text-align: center;
            padding: 10px;
            z-index: 9999;
        }
        .loading-error button {
            margin-left: 10px;
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            background: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <header>
            <nav class="nav-bar">
                <a href="/" class="logo">OverlandX</a>
                <div class="nav-links">
                    <a href="/" class="active">Home</a>
                    <a href="/about.html">About</a>
                </div>
            </nav>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Trail List Panel -->
            <aside class="trail-panel">
                <h2>Routes</h2>
                <div class="trail-list" id="trailList">
                    <!-- Trails will be populated here -->
                </div>
            </aside>

            <!-- Map Container -->
            <section class="map-container">
                <div id="map"></div>
            </section>
        </main>

        <!-- AI Chat Assistant -->
        <div class="chat-widget" id="chatWidget">
            <button class="chat-toggle" id="chatToggle">
                <span>Trail Assistant</span>
            </button>
            <div class="chat-container" id="chatContainer" style="display: none;">
                <div class="chat-header">
                    <h3>Trail Assistant</h3>
                    <button class="close-chat" id="closeChat">×</button>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input">
                    <input type="text" id="userInput" placeholder="Ask about trails...">
                    <button id="sendMessage">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Retry loading script if it fails
        function loadScript(src, retries = 3) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.crossOrigin = "anonymous";
                
                script.onload = resolve;
                script.onerror = () => {
                    if (retries > 0) {
                        setTimeout(() => {
                            loadScript(src, retries - 1).then(resolve).catch(reject);
                        }, 1000);
                    } else {
                        reject(new Error(`Failed to load script: ${src}`));
                    }
                };
                
                document.body.appendChild(script);
            });
        }

        // Load scripts in sequence
        async function loadScripts() {
            try {
                await loadScript('https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js');
                await loadScript('/trailManager.js');
                await loadScript('/app.js');
            } catch (error) {
                console.error('Script loading failed:', error);
                const element = document.createElement('div');
                element.className = 'loading-error';
                element.innerHTML = 'Failed to load some resources. <button onclick="window.location.reload()">Retry</button>';
                document.body.prepend(element);
            }
        }

        loadScripts();
    </script>
</body>
</html>
